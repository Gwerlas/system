---
- name: Portage - Cleanup old kernels
  listen:
    - eclean-kernel
  become: true
  ansible.builtin.command:
    cmd: eclean-kernel -n 2
  register: result
  changed_when: result.stdout != 'No outdated kernels found.'

# Sync handlers must run BEFORE any @world emerge so newly declared overlays
# (e.g. guru via system_portage_repos) are populated before they're queried.
# Ansible fires handlers in the order they're defined, regardless of notify
# order.
- name: Portage - Repositories sync types
  listen:
    - sync repos
  become: true
  community.general.portage:
    package: dev-vcs/git

- name: Portage - Sync repositories
  listen:
    - sync repos
  become: true
  ansible.builtin.command:
    cmd: emerge --sync {{ repo.name }}
  loop: "{{ system_portage_repos }}"
  loop_control:
    loop_var: repo
  register: result
  changed_when: not "You are already up to date" in result.stdout
  until: result is success
  retries: "{{ system_retries }}"

- name: Portage - Prevent circular dependencies and multilib compilation failures
  listen:
    - change profile
  become: true
  when: is_desktop
  environment:
    USE: minimal
  community.general.portage:
    oneshot: true
    getbinpkg: true
    newuse: true
    package:
      - sys-libs/glibc
      - sys-devel/gcc
      - dev-lang/rust{{ system_portage_use_bin_suffix | ternary('-bin', '') }}
      - dev-python/setuptools
      - media-libs/libsndfile

- name: Portage - Rebuild packages that need to be rebuilt
  listen:
    - change profile
    - emerge --newuse
  become: true
  community.general.portage:
    deep: true
    newuse: true
    update: "{{ system_packages_upgrade }}"
    package: '@world'

- name: Portage - Auto merge kernel savedconfig
  listen:
    - etc-update savedconfig
  become: true
  vars:
    savedconfig: /etc/portage/savedconfig/sys-kernel/{{ system_portage_kernel }}-{{ system_latest_kernel }}
  ansible.builtin.command:
    cmd: etc-update --automode -5 {{ savedconfig }}
  register: result
  changed_when: savedconfig in result.stdout

- name: Portage - Clean dependencies
  listen:
    - change profile
    - eclean-kernel
    - emerge --newuse
  become: true
  community.general.portage:
    depclean: true

- name: Portage - Kernel modules rebuild
  listen:
    - emerge @module-rebuild
  become: true
  community.general.portage:
    package: '@module-rebuild'

# Rebuild the dracut initramfs for every installed kernel. dracut bundles the
# CPU microcode it finds at build time, so this keeps the early microcode in
# sync after linux-firmware changes. Paired with grub-mkconfig, it also drops
# any stale standalone microcode image (e.g. /boot/amd-uc.img) from the boot
# entries. Runs before "Update Grub configuration" (handler load order).
- name: Portage - Regenerate initramfs
  listen:
    - regenerate initramfs
  become: true
  ansible.builtin.command:
    cmd: dracut --force --regenerate-all
  changed_when: true

- name: Portage - Detect root filesystem
  listen:
    - grub-install
  become: true
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail &&
      lsblk -oMOUNTPOINT,PKNAME -rn | awk '$1 ~ /^\/$/ { print $2 }'
    executable: /bin/bash
  changed_when: false
  register: result

- name: Portage - Install Grub
  listen:
    - grub-install
  become: true
  vars:
    arguments: >-
      {% if system_boot_mode == 'efi' %}
        --target={{ ansible_facts.architecture }}-{{ system_boot_mode }}
        --efi-directory={{ system_grub_efi_directory }}
      {% else %}
        /dev/{{ result.stdout }}
      {% endif %}
  ansible.builtin.command:
    cmd: grub-install {{ arguments }}
  changed_when: true
