---
# Source of truth for officially supported platforms (LTS / stable only).
# After edits, run scripts/sync-meta-platforms.py to refresh meta/main.yml.
# Each scenario's molecule.yml picks a subset by name and provides groups /
# memory overrides; create.yml looks up image_url here.
platforms:
  # Arch Linux — rolling, official cloud image
  - name: archlinux
    galaxy: {name: ArchLinux, version: all}
    image_url: https://geo.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2

  # Debian — stable + oldstable
  - name: bookworm
    galaxy: {name: Debian, version: bookworm}
    # Debian 12's `genericcloud` variant has no EFI bootloader — use `generic`
    image_url: https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-amd64.qcow2
  - name: trixie
    galaxy: {name: Debian, version: trixie}
    image_url: https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2

  # Ubuntu — LTS still supported
  - name: jammy
    galaxy: {name: Ubuntu, version: jammy}
    image_url: https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img
  - name: noble
    galaxy: {name: Ubuntu, version: noble}
    image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img

  # EL — 9 and 10 streams
  - name: centos9s
    galaxy: {name: EL, version: "9"}
    image_url: https://cloud.centos.org/centos/9-stream/x86_64/images/CentOS-Stream-GenericCloud-9-latest.x86_64.qcow2
  - name: alma9
    galaxy: {name: EL, version: "9"}
    image_url: https://repo.almalinux.org/almalinux/9/cloud/x86_64/images/AlmaLinux-9-GenericCloud-latest.x86_64.qcow2
  - name: centos10s
    galaxy: {name: EL, version: "10"}
    image_url: https://cloud.centos.org/centos/10-stream/x86_64/images/CentOS-Stream-GenericCloud-10-latest.x86_64.qcow2
  - name: alma10
    galaxy: {name: EL, version: "10"}
    image_url: https://repo.almalinux.org/almalinux/10/cloud/x86_64/images/AlmaLinux-10-GenericCloud-latest.x86_64.qcow2

  # Fedora — N and N-1. galaxy version is `all`: the meta schema only knows
  # Fedora versions up to a fixed ceiling (no 44 yet), and `all` avoids having
  # to bump meta/main.yml on every Fedora release.
  - name: fedora43
    galaxy: {name: Fedora, version: all}
    image_url: https://download.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2
  - name: fedora44
    galaxy: {name: Fedora, version: all}
    image_url: https://download.fedoraproject.org/pub/fedora/linux/releases/44/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-44-1.7.x86_64.qcow2

  # Gentoo — rolling, pinned to a specific cloudinit autobuild
  - name: gentoo
    galaxy: {name: Gentoo, version: all}
    # Gentoo's cloudinit image ships only the EFI bootloader, no BIOS GRUB
    firmware: efi
    # Rolling: autobuilds are pruned after a few weeks, so don't pin a timestamp
    # (it 404s). create.yml resolves the current image from this pointer file.
    image_latest: https://distfiles.gentoo.org/releases/amd64/autobuilds/latest-di-amd64-cloudinit.txt

  # === Future / development branches (used by molecule/future only) ===
  # These have no `galaxy:` entry on purpose: development branches don't
  # belong in `meta/main.yml`'s `galaxy_info.platforms` (Ansible Galaxy only
  # accepts officially released versions). sync-meta-platforms.py skips
  # platforms without a `galaxy:` key.
  # Debian's daily images use netplan, which writes its config for the
  # kernel name (eth0) before udev renames the interface to ens3. Override
  # via cidata with a glob match so the renamed NIC is still picked up;
  # `optional: true` keeps boot moving if a secondary NIC has no DHCP.
  - name: forky
    image_url: https://cloud.debian.org/images/cloud/forky/daily/latest/debian-14-generic-amd64-daily.qcow2
    cloud_init_network: &debian_dev_network
      version: 2
      ethernets:
        ethernet:
          match:
            name: e*
          dhcp4: true
          optional: true
  - name: sid
    image_url: https://cloud.debian.org/images/cloud/sid/daily/latest/debian-sid-generic-amd64-daily.qcow2
    cloud_init_network: *debian_dev_network
  - name: fedora-rawhide
    image_url: https://dl.fedoraproject.org/pub/fedora/linux/development/rawhide/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-Rawhide-20260602.n.0.x86_64.qcow2
