---
dependency:
  name: galaxy
driver:
  name: default
# Tests each platform declared in molecule/platforms.yml.
platforms:
  - name: archlinux
    groups:
      - archlinux
    memory: 2
  - name: bookworm
    groups:
      - debian_like
      - debian
  - name: trixie
    groups:
      - debian_like
      - debian
  - name: jammy
    groups:
      - debian_like
      - ubuntu
    memory: 2
  - name: noble
    groups:
      - debian_like
      - ubuntu
    memory: 2
  - name: centos9s
    groups:
      - redhat_like
    memory: 2
  - name: alma9
    groups:
      - redhat_like
    memory: 2
  - name: centos10s
    groups:
      - redhat_like
    memory: 2
  - name: alma10
    groups:
      - redhat_like
    memory: 2
  - name: fedora43
    groups:
      - redhat_like
    memory: 2
  - name: fedora44
    groups:
      - redhat_like
    memory: 2
  - name: gentoo
    groups:
      - gentoo
    memory: 4
provisioner:
  name: ansible
  playbooks:
    create: create.yml
    destroy: destroy.yml
    converge: converge.yml
    verify: verify.yml
verifier:
  name: ansible
