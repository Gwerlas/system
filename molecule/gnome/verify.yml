---
- name: Verify role for Stream distributions
  hosts: all
  tasks:
    - name: Command line tools
      ansible.builtin.command: "{{ item }} --version"
      changed_when: false
      with_items:
        - lsusb

    - name: GDM service
      check_mode: true
      ansible.builtin.service:
        name: gdm
        state: started
      register: result
      failed_when: result.changed

    - name: Check
      vars:
        ecdsa_pub: "{{ [ansible_ssh_host_key_ecdsa_public_keytype, ansible_ssh_host_key_ecdsa_public] | join(' ') }}"
        ed25519_pub: "{{ [ansible_ssh_host_key_ed25519_public_keytype, ansible_ssh_host_key_ed25519_public] | join(' ') }}"
        rsa_pub: "{{ [ansible_ssh_host_key_rsa_public_keytype, ansible_ssh_host_key_rsa_public] | join(' ') }}"
      ansible.builtin.assert:
        quiet: true
        that:
          - ecdsa_pub == lookup('file', 'ecdsa.pub')
          - ed25519_pub == lookup('file', 'ed25519.pub')
          - rsa_pub == lookup('file', 'rsa.pub')
