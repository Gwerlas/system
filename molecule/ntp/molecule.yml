---
dependency:
  name: galaxy
driver:
  name: default
# Tests the ntp time backend. RHEL/Fedora families mask `ntp` in their
# supported_time_backends, and Debian dropped the ntp package in trixie
# (vars/debian13.yml masks it too), so this scenario only targets distros
# that ship a usable ntpd.
platforms:
  - name: archlinux
    groups:
      - archlinux
    memory: 2
  - name: bookworm
    groups:
      - debian_like
      - debian
  - name: jammy
    groups:
      - debian_like
      - ubuntu
    memory: 2
  - name: noble
    groups:
      - debian_like
      - ubuntu
    memory: 2
  - name: gentoo
    groups:
      - gentoo
    memory: 4
    vcpus: 4
provisioner:
  name: ansible
  playbooks:
    create: create.yml
    destroy: destroy.yml
    converge: converge.yml
    verify: verify.yml
verifier:
  name: ansible
