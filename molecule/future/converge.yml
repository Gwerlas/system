---
- name: In developments releases
  hosts: all
  tasks:
    - name: Include gwerlas.system
      ansible.builtin.include_role:
        name: gwerlas.system
      vars:
        # Future distros are flaky on network/cache (rawhide mirrors, sid
        # archives), so retry more aggressively than the default of 2.
        system_retries: 5
        system_packages_upgrade: true
        # Gentoo: opt into the testing branch and exercise the vanilla kernel
        # path plus the GURU overlay in a non-default location.
        system_portage_unstable_arch: true
        system_portage_kernel: vanilla-kernel
        system_portage_repos_directory: /data
        system_portage_repos:
          - name: guru
