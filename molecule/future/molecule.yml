---
# Exercises the role against the next-release branches of each distro family
# we support: Debian forky/sid (daily cloud images), Fedora Rawhide, and
# Gentoo with `~amd64` keywords (testing branch). The intent is to catch
# breakage before these versions land in the default scenario.
dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: forky
    groups:
      - debian_like
      - debian
    memory: 2
  - name: sid
    groups:
      - debian_like
      - debian
    memory: 2
  - name: fedora-rawhide
    groups:
      - redhat_like
    memory: 2
  - name: gentoo
    groups:
      - gentoo
    memory: 4
    vcpus: 4
provisioner:
  name: ansible
  playbooks:
    create: create.yml
    destroy: destroy.yml
    converge: converge.yml
    verify: verify.yml
verifier:
  name: ansible
