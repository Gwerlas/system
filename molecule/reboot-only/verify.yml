---
- name: Verify the fact
  hosts: all
  vars:
    system_reboot_handler: skip
  tasks:
    - name: Get the fact
      ansible.builtin.import_role:
        name: gwerlas.system
        tasks_from: reboot

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Reboot isn't required
      ansible.builtin.assert:
        that: system_needs_reboot is false
