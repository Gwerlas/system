---
dependency:
  name: galaxy
driver:
  name: default
# Tests the systemd-timesyncd time backend (the role's default for distros
# that ship it). The RHEL 9/10 family masks systemd-timesyncd in favour of
# chrony, so this scenario excludes them.
platforms:
  - name: archlinux
    groups:
      - archlinux
    memory: 2
  - name: bookworm
    groups:
      - debian_like
      - debian
  - name: trixie
    groups:
      - debian_like
      - debian
  - name: jammy
    groups:
      - debian_like
      - ubuntu
    memory: 2
  - name: noble
    groups:
      - debian_like
      - ubuntu
    memory: 2
  - name: fedora43
    groups:
      - redhat_like
    memory: 2
  - name: fedora44
    groups:
      - redhat_like
    memory: 2
  - name: gentoo
    groups:
      - gentoo
    memory: 4
    vcpus: 4
provisioner:
  name: ansible
  playbooks:
    create: create.yml
    destroy: destroy.yml
    converge: converge.yml
    verify: verify.yml
verifier:
  name: ansible
