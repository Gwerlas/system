---
# Under automatic mode, we use the binhost when one is configured (typical
# on cloud images and catalyst stages) and fall back to source builds on
# bare installs. See [[facts.yml]] for the `has_binhost` detection.
packages_build: |-
  {{
    (not (has_binhost | default(false)))
    if system_packages_build == 'auto'
    else system_packages_build
  }}

family_packages:
  bridge:
    - net-misc/bridge-utils
  firefox:
    - www-client/firefox{{ system_portage_use_bin_suffix | ternary('-bin', '') }}
  gdm:
    - gnome-base/gdm
  libreoffice:
    - app-office/libreoffice{{ system_portage_use_bin_suffix | ternary('-bin', '') }}
  python3-jmespath:
    - dev-python/jmespath
  zsh:
    - app-shells/zsh
    - app-shells/zsh-completions
    - app-shells/zsh-syntax-highlighting
    - app-shells/gentoo-zsh-completions

masks:
  packages:
    - systemd-timesyncd
