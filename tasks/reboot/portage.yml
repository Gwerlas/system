---
- name: Portage - Installed/updated packages during this boot
  ansible.builtin.include_tasks:
    file: "{{ role_path }}/tasks/packages/portage/installed-this-boot.yml"

- name: Portage - Set fact system_needs_reboot
  vars:
    patterns:
      - sys-boot/grub
      - sys-apps/{{ ansible_facts.service_mgr }}
      - sys-kernel/{{ system_portage_kernel }}
      - sys-libs/glibc
    occurences: |
      {{
        installed_this_boot.stdout_lines |
        select(
          'search',
          patterns | join('|')
        )
      }}
  ansible.builtin.set_fact:
    system_needs_reboot: "{{ (occurences | length) > 0 }}"

- name: Portage - Grub
  vars:
    has_changed: "{{ 'sys-boot/grub' in installed_this_boot.stdout }}"
  ansible.builtin.debug:
    msg: |-
      {{
        has_changed | ternary(
          "Grub has changed",
          "Grub hasn't changed"
        )
      }}
  changed_when: has_changed
  notify:
    - grub-install
    - "{{ system_reboot_handler }}"

- name: Portage - Service manager
  vars:
    has_changed: "{{ ('sys-apps/' + ansible_facts.service_mgr) in installed_this_boot.stdout }}"
  ansible.builtin.debug:
    msg: |-
      {{
        has_changed | ternary(
          ansible_facts.service_mgr + " has changed",
          ansible_facts.service_mgr + " hasn't changed"
        )
      }}
  changed_when: has_changed
  notify: "{{ system_reboot_handler }}"

- name: Portage - Glibc
  vars:
    has_changed: "{{ 'sys-libs/glibc' in installed_this_boot.stdout }}"
  ansible.builtin.debug:
    msg: |-
      {{
        has_changed | ternary(
          "Glibc has changed",
          "Glibc hasn't changed"
        )
      }}
  changed_when: has_changed
  notify:
    - reload init system
    - "{{ system_reboot_handler }}"

- name: Portage - Kernel
  vars:
    has_changed: "{{ ('sys-kernel/' + system_portage_kernel) in installed_this_boot.stdout }}"
  ansible.builtin.debug:
    msg: |-
      {{
        has_changed | ternary(
          "Kernel has changed",
          "Kernel hasn't changed"
        )
      }}
  changed_when: has_changed
  notify:
    - eclean-kernel
    - grub-mkconfig
    - "{{ system_reboot_handler }}"

# linux-firmware ships the CPU microcode that dracut bundles into the initramfs
# and that a standalone /boot/*-uc.img may carry. When it changes we rebuild the
# initramfs and the bootloader config so the boot entries stay consistent (a
# stale microcode image reference would otherwise break the next boot).
- name: Portage - Linux firmware
  vars:
    has_changed: "{{ 'sys-kernel/linux-firmware' in installed_this_boot.stdout }}"
  ansible.builtin.debug:
    msg: |-
      {{
        has_changed | ternary(
          "Linux firmware has changed",
          "Linux firmware hasn't changed"
        )
      }}
  changed_when: has_changed
  notify:
    - regenerate initramfs
    - grub-mkconfig
    - "{{ system_reboot_handler }}"
