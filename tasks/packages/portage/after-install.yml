---
- name: Portage - Clean dependencies
  # Bypasses community.general.portage's `depclean: true` path because its
  # cleanup_packages() calls module.fail_json(cmd=..., rc=..., stdout=..., stderr=...)
  # without a mandatory `msg=`, crashing the module on any non-zero emerge
  # before the actual error reaches Ansible. Same effect, cleaner failure.
  # Fix merged upstream as community.general PR #12168; switch back to the
  # `community.general.portage` module once the release that ships it is out.
  become: true
  ansible.builtin.command:
    cmd: emerge --depclean --quiet
  register: depclean
  changed_when: "'Number removed: 0' not in depclean.stdout"
  notify: emerge --newuse

- name: Portage - Clean distfiles
  become: true
  ansible.builtin.command:
    cmd: eclean-dist --deep
  register: result
  changed_when: not 'Your distfiles directory was already clean.' in result.stdout

- name: Unconfined systems
  when: not in_container
  block:
    - name: Portage - Installed/updated packages during this boot
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/tasks/packages/portage/installed-this-boot.yml"

    # If cpuid2cpuflags has been updated, its output may change now so we have to
    # update /etc/portage/make.conf as well and rebuild the impacted packages if
    # required.
    - name: Portage - CPU flags
      when: "'app-portage/cpuid2cpuflags' in installed_this_boot.stdout"
      ansible.builtin.include_tasks:
        file: "{{ role_path }}/tasks/package-managers/portage/make.conf.yml"

- name: Portage - Etc update
  become: true
  ansible.builtin.command:
    cmd: etc-update --automode -5
  register: result
  changed_when: result.stdout_lines | length > 2
