---
# Package-manager specific post-install (e.g. Portage depclean, eclean-dist,
# etc-update). Runs before the reboot trigger so the system is cleaned up first.
- name: Packages - After install - Package manager specific
  vars:
    task_file: "{{ role_path }}/tasks/packages/{{ ansible_facts.pkg_mgr }}/after-install.yml"
  when: task_file is file
  ansible.builtin.include_tasks:
    file: "{{ task_file }}"

- name: Packages - Services - Show the list
  ansible.builtin.debug:
    var: system_services
    verbosity: 1

- name: Packages - Services
  become: true
  ansible.builtin.service:
    name: "{{ service }}"
    state: started
    enabled: true
  loop: "{{ system_services }}"
  loop_control:
    loop_var: service

- name: Packages - Trigger a reboot if needed
  when: not in_container
  ansible.builtin.include_tasks:
    file: "{{ role_path }}/tasks/reboot.yml"
