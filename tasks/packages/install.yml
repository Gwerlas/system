---
- name: Packages - Distribution upgrade
  when: system_packages_upgrade | bool
  ansible.builtin.include_tasks:
    file: "{{ package_task }}"
  with_first_found:
    - files:
        - dist-upgrade.yml
      paths:
        - "{{ role_path }}/tasks/packages/{{ ansible_facts.pkg_mgr }}"
        - "{{ role_path }}/tasks/packages/other"
  loop_control:
    loop_var: package_task

- name: Packages - Install - Show the list
  ansible.builtin.debug:
    var: system_packages
    verbosity: 1

- name: Packages - Installation
  ansible.builtin.include_tasks:
    file: "{{ package_task }}"
  with_first_found:
    - files:
        - install.yml
      paths:
        - "{{ role_path }}/tasks/packages/{{ ansible_facts.pkg_mgr }}"
        - "{{ role_path }}/tasks/packages/other"
  loop_control:
    loop_var: package_task
